<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Costy-Cart Page</title>
    <!-- Css Link -->
    <link rel="stylesheet" href="./styles.css" />
    <!-- Bootstrap Icons CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      /* Sepet ikonunda ürün sayısı göstermek */
      #basket-btn {
        position: relative;
      }

      #basket-btn::after {
        content: attr(data-quantity);
        position: absolute;
        top: -10px;
        right: -10px;
        background: crimson;
        color: white;
        width: 20px;
        height: 20px;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-weight: bold;
        transition: 0.3s;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container">
        <!-- Sepet ikonunu buraya ekledik -->
        <a href="/cart.html">
          <i class="bi bi-bag-plus-fill" data-quantity="0" id="basket-btn"></i>
        </a>
      </div>
    </header>

    <!-- Cart Container -->
    <section class="container cart-container">
      <!-- Back To Home Button -->
      <a href="/index.html" class="back-to-home-button">
        <i class="bi bi-chevron-left"></i> <span>Back to home</span>
      </a>

      <!-- Title -->
      <h2 class="cart-title">Shopping Cart</h2>

      <!-- Wrapper -->
      <div class="cart-wrapper">
        <!-- Cart Items -->
        <div class="cart-items"></div>

        <!-- Checkbox / Total -->
        <div class="cart-checkbox">
          <h2>Total: <span class="cart-total">$ 0</span></h2>
          <button class="checkout-btn">Checkout</button>
          <p class="fee-title">Under $100 free shipping</p>
        </div>
      </div>
    </section>

    <!-- Js Connection -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
